{{ define "main" }}
<section class="screen" data-page="uses" aria-label="Uses">
  <h1 class="page-title mb-6">{{ .Title }}</h1>
  <p class="lead">{{ .Params.lead }}</p>
  {{ $groups := .Params.groups }}
  {{ range $i, $g := $groups }}
  <h2 class="section-label mb-10">{{ $g.heading }}</h2>
  <ul class="uses-list{{ if eq (add $i 1) (len $groups) }} uses-list--last{{ end }}">
    {{ range $g.items }}
    <li class="uses-item"><span class="uses-key">{{ .key }}</span><span>{{ .value }}</span></li>
    {{ end }}
  </ul>
  {{ end }}
</section>
{{ end }}
